related_poems:
  - title: 庐山茶
    author: 陆羽
    dynasty: 唐
    content: |
      庐山云雾茶，香飘万里家。
      品茗思古人，清风拂面来。

  - title: 品茶
    author: 朱熹
    dynasty: 南宋
    content: |
      半亩方塘一鉴开，天光云影共徘徊。
      问渠那得清如许，为有源头活水来。
