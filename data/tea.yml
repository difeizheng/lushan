  - benefit: 降脂减肥
    description: 有助于降低血脂，促进脂肪代谢。

  - benefit: 防癌抗癌
    description: 茶多酚等成分具有抑制癌细胞生长的作用。

  - benefit: 美容养颜
    description: 抗氧化成分有助于延缓衰老，美容养颜。

  - benefit: 清热解毒
    description: 性凉，有清热解毒、生津止渴的功效。

culture_stories:
  - title: 慧远种茶
    content: |
      东晋时期，高僧慧远在庐山东林寺修行。为方便僧人
      打坐时提神，他在寺周围种植茶树。所产茶叶香气
      清高，滋味醇厚，深受文人墨客喜爱，庐山云雾茶
      由此闻名。

  - title: 朱熹品茶
    content: |
      南宋朱熹在白鹿洞书院讲学时，最爱品饮庐山云雾茶。
      他常说："品茶如品人生，苦中有甘，淡中见真。"
      他的"半亩方塘"诗，相传就是品茗时所作。

  - title: 周恩来与云雾茶
    content: |
      1959 年庐山会议期间，周恩来品尝庐山云雾茶后赞不绝口，
      说："这茶真好，清香扑鼻，回味无穷。"此后，庐山
      云雾茶被指定为国事活动用茶。

