processing_steps:
  - step: 1
    name: 采摘
    description: |
      清明前后采摘，以一芽一叶或一芽二叶初展为标准。
      要求鲜叶嫩匀齐整，无病虫害，无机械损伤。
    time: 清晨露水干后至上午 10 点

  - step: 2
    name: 摊晾
    description: |
      将鲜叶摊放在阴凉通风处，使水分适度散失。
      摊晾时间 4-6 小时，摊叶厚度 2-3 厘米。
    time: 4-6 小时

  - step: 3
    name: 杀青
    description: |
      锅温 180-200℃，投入鲜叶后快速翻炒，
      使茶叶中的酶失去活性，保持绿茶品质。
    time: 5-8 分钟

  - step: 4
    name: 揉捻
    description: |
      采用手工或机械揉捻，使茶叶形成条索状。
      揉捻力度适中，以茶叶不出汁为度。
    time: 15-20 分钟

  - step: 5
    name: 干燥
    description: |
      分初干和足干两次进行，使茶叶含水量降至 5% 以下。
      干燥温度先高后低，防止茶叶焦糊。
    time: 30-40 分钟

  - step: 6
    name: 筛选
    description: |
      去除茶梗、黄片等杂质，按等级分类包装。
    time: 10-15 分钟

brewing_guide:
  water_temperature: 80-85°C
  tea_amount: 3-5 克/150ml
  steeping_time:
    - 第 1 泡：1 分钟
    - 第 2 泡：1.5 分钟
    - 第 3 泡：2 分钟
    - 第 4 泡：3 分钟
  vessels:
    - 玻璃杯：便于观赏茶叶舒展
    - 盖碗：保持茶香
    - 紫砂壶：适合老茶客
  tips:
    - 宜用山泉水或纯净水冲泡
    - 不宜用沸水直接冲泡，会烫伤茶叶
    - 可冲泡 3-4 次，每次递增时间
    - 品饮前先闻香，再小口慢饮

