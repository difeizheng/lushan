# 庐山云雾茶文化数据
# 中国十大名茶之一

tea_info:
  name: 庐山云雾茶
  type: 绿茶
  origin: 江西庐山
  history_years: 1900
  status: 中国十大名茶之一
  description: |
    庐山云雾茶是中国十大名茶之一，产于江西庐山海拔 800 米以上的山区。
    由于庐山常年云雾缭绕，茶树在云雾中生长，故称"云雾茶"。
    其品质特点为：条索紧秀，色泽翠绿，汤色清澈，香气清高，滋味醇厚。

history:
  - period: 东汉
    year: "200"
    event: 开始种植
    description: 庐山开始种植茶树，距今已有 1800 多年历史。

  - period: 东晋
    year: "386"
    event: 僧人种茶
    description: 慧远在東林寺种植茶树，供僧人饮用和待客。

  - period: 唐代
    year: "618-907"
    event: 闻名全国
    description: 庐山云雾茶开始闻名全国，被列为贡茶。

  - period: 宋代
    year: "960-1279"
    event: 品质提升
    description: 制茶工艺不断改进，品质达到新高度。

  - period: 明代
    year: "1368-1644"
    event: 徐霞客赞誉
    description: 徐霞客在游记中高度评价庐山云雾茶。

  - period: 清代
    year: "1644-1911"
    event: 贡茶地位
    description: 被列为朝廷贡品，每年进贡皇室。

  - period: 民国
    year: "1912-1949"
    event: 国际获奖
    description: 1915 年获巴拿马万国博览会金奖。

  - period: 现代
    year: "1959"
    event: 国家名茶
    description: 被评为全国十大名茶之一。

  - period: 当代
    year: "2001"
    event: 地理标志
    description: 获国家地理标志产品保护。

