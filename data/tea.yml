buying_guide:
  tips:
    - 看外形：条索紧秀，色泽翠绿，白毫显露
    - 闻香气：清香持久，无异味
    - 观汤色：清澈明亮，呈嫩绿色
    - 尝滋味：鲜爽醇厚，回甘明显
    - 看叶底：嫩绿匀齐，无红梗红叶
  price_reference:
