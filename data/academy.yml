  - name: 朱熹画像碑
    type: 碑刻
    description: 刻有朱熹画像及生平简介。
    status: 保存完好

  - name: 白鹿洞书院记
    type: 碑刻
    description: 记载书院历史的石碑。
    status: 保存完好

  - name: 御书楼匾额
    type: 匾额
    description: 皇帝御赐的匾额。
    status: 保存完好

visiting_info:
  open_time: 08:30-17:30
  ticket_price: 40 元
  best_season: 春秋两季
  traffic: |
    从庐山牯岭镇乘车至海会镇，步行约 20 分钟可达。
    或从庐山南门乘索道至海会，步行可达。
  tips:
    - 书院内保持安静，尊重文化氛围
    - 可请导游讲解，深入了解历史文化
    - 建议游览时间 1-2 小时
    - 可与秀峰、三叠泉等景点联游

related_poems:
  - title: 白鹿洞书院
    author: 朱熹
    dynasty: 南宋
    content: |
      半亩方塘一鉴开，天光云影共徘徊。
      问渠那得清如许，为有源头活水来。

  - title: 白鹿洞怀朱子
    author: 王阳明
    dynasty: 明
    content: |
      白鹿洞中寻旧踪，朱子遗风万世崇。
      格物致知传千古，理学源头在此中。
