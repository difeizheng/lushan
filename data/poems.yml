  - id: 47
    title: 咏庐山松
    author: 齐白石
    author_id: 41
    dynasty: 现代
    content: |
      庐山松老不知年，盘曲虬枝入画檐。
      墨客挥毫图写意，千年风骨自昂然。
    location: 庐山
    location_id: null
    background: |
      齐白石画庐山松，题诗其上。
    type: 写景

  - id: 48
    title: 白鹿洞怀朱子
    author: 王阳明
    author_id: 42
    dynasty: 明
    content: |
      白鹿洞中寻旧踪，朱子遗风万世崇。
      格物致知传千古，理学源头在此中。
    location: 白鹿洞书院
    location_id: 13
    background: |
      王阳明游白鹿洞书院，缅怀朱熹而作。
    type: 抒情

  - id: 49
    title: 花径寻春
    author: 李清照
    author_id: 43
    dynasty: 南宋
    content: |
      花径寻春春已深，落红满地惜芳心。
      桃花依旧笑春风，不见当年种树人。
    location: 花径
    location_id: 7
    background: |
      李清照游花径，缅怀白居易而作。
    type: 抒情

  - id: 50
    title: 锦绣谷中
    author: 元好问
    author_id: 44
    dynasty: 金
    content: |
      锦绣谷中锦似堆，千红万紫斗芳菲。
      春风不解游人意，吹落花瓣满径飞。
    location: 锦绣谷
    location_id: 8
    background: |
      元好问游锦绣谷，被春花所感染而作。
    type: 写景

  - id: 51
    title: 仙人洞怀古
    author: 纳兰性德
    author_id: 45
    dynasty: 清
    content: |
      仙人洞外白云飞，洞内仙人几时归。
      千古兴亡多少事，空余流水送斜晖。
    location: 仙人洞
    location_id: 9
    background: |
      纳兰性德游仙人洞，怀古伤今而作。
    type: 抒情

  - id: 52
    title: 如琴湖泛舟
    author: 冰心
    author_id: 46
    dynasty: 现代
    content: |
      如琴湖面泛轻舟，碧水青山入眼眸。
      湖光山色皆如画，人在画中游不休。
    location: 如琴湖
    location_id: 12
    background: |
      冰心在如琴湖泛舟，被美景陶醉而作。
    type: 写景

  - id: 53
    title: 庐山云雾
    author: 矛盾
    author_id: 47
    dynasty: 现代
    content: |
      庐山云雾甲天下，变幻莫测似仙境。
      时而如海翻波浪，时而如纱笼美龄。
    location: 庐山
    location_id: null
    background: |
      矛盾游览庐山，被云雾奇景所吸引而作。
    type: 写景

  - id: 54
    title: 登大汉阳峰
    author: 曹操
    author_id: 48
    dynasty: 汉
    content: |
      巍巍大汉阳，雄踞庐山巅。
      登高望四海，胸中起波澜。
      长江东流去，鄱湖映远天。
      人生几何时，当立万古名。
    location: 汉阳峰
    location_id: 15
    background: |
      相传曹操登庐山汉阳峰，抒发壮志而作。
    type: 抒情

  - id: 55
    title: 石门瀑布
    author: 张旭
    author_id: 49
    dynasty: 唐
    content: |
      石门瀑布挂青天，飞流直下三千尺。
      狂草挥毫书壮志，豪情万丈入诗篇。
    location: 石门涧
    location_id: null
    background: |
      张旭观石门瀑布，借酒挥毫而作。
    type: 写景

  - id: 56
    title: 归宗寺
    author: 杜牧
    author_id: 50
    dynasty: 唐
    content: |
      归宗古寺锁烟霞，千载钟声送落花。
      借问禅僧何处去，白云深处是吾家。
    location: 归宗寺
    location_id: null
    background: |
      杜牧游归宗寺，与僧人交谈而作。
    type: 抒情

  - id: 57
    title: 栖贤寺晓望
    author: 岑参
    author_id: 51
    dynasty: 唐
    content: |
      栖贤寺里晓钟鸣，惊起林间百鸟鸣。
      开窗遥望庐山雪，一片冰心在玉壶。
    location: 栖贤寺
    location_id: null
    background: |
      岑参宿栖贤寺，清晨远望而作。
    type: 抒情

  - id: 58
    title: 三叠泉歌
    author: 李贺
    author_id: 52
    dynasty: 唐
    content: |
      三叠泉飞下九天，银河倒挂石门前。
      飞珠溅玉声如雷，惊动山中万壑猿。
    location: 三叠泉
    location_id: 1
    background: |
      李贺游三叠泉，以奇特想象描绘瀑布而作。
    type: 写景

  - id: 59
    title: 庐山松涛
    author: 吴昌硕
    author_id: 53
    dynasty: 清末
    content: |
      庐山松下听松涛，如闻天籁入云霄。
      挥毫泼墨写苍劲，千年风骨傲霜刀。
    location: 庐山
    location_id: null
    background: |
      吴昌硕画庐山松，题诗其上。
    type: 写景

  - id: 60
    title: 爱莲池
    author: 周敦颐
    author_id: 54
    dynasty: 北宋
    content: |
      庐山之麓有池水，周子爱莲此间栽。
      出淤泥而不染尘，濯清涟而不妖态。
      中通外直不蔓枝，香远益清更可爱。
      花之君子者也莲，千古流传留芳名。
    location: 庐山脚下
    location_id: null
    background: |
      周敦颐在庐山脚下种莲，作《爱莲说》传世。
    type: 哲理

  - id: 61
    title: 登庐山望江北
    author: 宋之问
    author_id: 55
    dynasty: 唐
    content: |
      庐岳东南秀，香炉紫气浮。
      登高望江北，极目见神州。
      云开九派水，日落万山秋。
      故乡何处是，烟波江上愁。
    location: 庐山
    location_id: null
    background: |
      宋之问登庐山远眺，思念故乡而作。
    type: 抒情

  - id: 62
    title: 简寂观
    author: 陆羽
    author_id: 56
    dynasty: 唐
    content: |
      简寂观中寻陆公，茶道渊源在此中。
      庐山云雾茶飘香，品茗论道乐无穷。
    location: 简寂观
    location_id: null
    background: |
      陆羽在庐山简寂观研究茶道，著《茶经》。
    type: 写景

  - id: 63
    title: 观音桥
    author: 唐伯虎
    author_id: 17
    dynasty: 明
    content: |
      观音桥上听流水，桥下清泉石上流。
      古木参天遮白日，山花烂漫映清秋。
    location: 观音桥
    location_id: null
    background: |
      唐伯虎游观音桥，被山水景色吸引而作。
    type: 写景

  - id: 64
    title: 铁船峰
    author: 袁宏道
    author_id: 57
    dynasty: 明
    content: |
      铁船峰上望神州，万里长江入眼眸。
      云海翻腾如海浪，山风呼啸似龙舟。
    location: 铁船峰
    location_id: null
    background: |
      袁宏道登铁船峰，被壮丽景色震撼而作。
    type: 写景

  - id: 65
    title: 龙首崖
    author: 徐祯卿
    author_id: 58
    dynasty: 明
    content: |
      龙首崖高万丈余，悬崖峭壁势如飞。
      登临绝顶观云海，疑似仙境落尘世。
    location: 龙首崖
    location_id: null
    background: |
      徐祯卿游龙首崖，惊叹其险峻而作。
    type: 写景

  - id: 66
    title: 大天池
    author: 赵翼
    author_id: 59
    dynasty: 清
    content: |
      大天池水碧如蓝，倒映青山入画檐。
      林间鸟语声声脆，石上泉流细细吟。
    location: 大天池
    location_id: null
    background: |
      赵翼游览大天池，被湖光山色陶醉而作。
    type: 写景

  - id: 67
    title: 黄龙潭
    author: 龚自珍
    author_id: 60
    dynasty: 清
    content: |
      黄龙潭水深千尺，潭底潜龙欲飞天。
      我来正值秋风起，落叶满潭水面浮。
    location: 黄龙潭
    location_id: null
    background: |
      龚自珍游黄龙潭，借景抒情而作。
    type: 抒情

  - id: 68
    title: 乌龙潭
    author: 林则徐
    author_id: 61
    dynasty: 清
    content: |
      乌龙潭畔草萋萋，潭水清清照眼迷。
      借问潭中龙何在，飞入云端化作雨。
    location: 乌龙潭
    location_id: null
    background: |
      林则徐游乌龙潭，借景言志而作。
    type: 抒情

  - id: 69
    title: 香炉峰观瀑
    author: 王士禛
    author_id: 62
    dynasty: 清
    content: |
      香炉峰顶观飞瀑，疑似银河落九天。
      水花四溅如珠玉，声震山谷响如雷。
    location: 香炉峰
    location_id: null
    background: |
      王士禛登香炉峰观瀑布，赞叹自然奇观。
    type: 写景

  - id: 70
    title: 青玉峡
    author: 厉鹗
    author_id: 63
    dynasty: 清
    content: |
      青玉峡中水潺潺，两岸青山夹碧潭。
      峡谷幽幽藏古寺，钟声阵阵送斜阳。
    location: 青玉峡
    location_id: null
    background: |
      厉鹗游青玉峡，被幽静景色吸引而作。
    type: 写景

  - id: 71
    title: 文殊台
    author: 姚鼐
    author_id: 64
    dynasty: 清
    content: |
      文殊台上望群峰，云雾缭绕似仙境。
      松涛阵阵如海涌，山泉潺潺似琴鸣。
    location: 文殊台
    location_id: null
    background: |
      姚鼐登文殊台，被云海奇景震撼而作。
    type: 写景

  - id: 72
    title: 五老松风
    author: 郑珍
    author_id: 65
    dynasty: 清
    content: |
      五老峰前听松风，如闻琴瑟奏长空。
      苍松翠柏千年立，见证庐山万世荣。
    location: 五老峰
    location_id: 2
    background: |
      郑珍在五老峰听松涛，感慨历史沧桑。
    type: 抒情

  - id: 73
    title: 含鄱口晨望
    author: 魏源
    author_id: 66
