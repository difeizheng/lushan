# 庐山诗词数据
poems:
  - id: 1
    title: 望庐山瀑布
    author: 李白
    author_id: 5
    dynasty: 唐
    content: |
      日照香炉生紫烟，
      遥看瀑布挂前川。
      飞流直下三千尺，
      疑是银河落九天。
    location: 香炉峰
    location_id: null
    background: |
      此诗为李白第五次游庐山时所作，描写了庐山瀑布的雄伟壮观。
      诗人运用夸张手法，将瀑布比作银河从天而降，气势磅礴。
    type: 写景

  - id: 2
    title: 庐山谣寄卢侍御虚舟
    author: 李白
    author_id: 5
    dynasty: 唐
    content: |
      我本楚狂人，凤歌笑孔丘。
      手持绿玉杖，朝别黄鹤楼。
      五岳寻仙不辞远，一生好入名山游。
      庐山秀出南斗傍，屏风九叠云锦张，
      影落明湖青黛光。
      金阙前开二峰长，银河倒挂三石梁。
      香炉瀑布遥相望，回崖沓嶂凌苍苍。
      翠影红霞映朝日，鸟飞不到吴天长。
      登高壮观天地间，大江茫茫去不还。
      黄云万里动风色，白波九道流雪山。
      好为庐山谣，兴因庐山发。
      闲窥石镜清我心，谢公行处苍苔没。
      早服还丹无世情，琴心三叠道初成。
      遥见仙人彩云里，手把芙蓉朝玉京。
      先期汗漫九垓上，愿接卢敖游太清。
    location: 庐山
    location_id: null
    background: |
      此诗作于唐肃宗上元元年（760 年），李白流放夜郎遇赦后，
      在返回江夏途中游庐山时所作。
    type: 抒情

  - id: 3
    title: 大林寺桃花
    author: 白居易
    author_id: 6
    dynasty: 唐
    content: |
      人间四月芳菲尽，
      山寺桃花始盛开。
      长恨春归无觅处，
      不知转入此中来。
    location: 花径
    location_id: 7
    background: |
      白居易任江州司马期间，在大林寺（今花径附近）偶遇桃花盛开，
      感慨山下春花已谢，山上桃花始开，作此诗。
    type: 写景

  - id: 4
    title: 题西林壁
    author: 苏轼
    author_id: 7
    dynasty: 宋
    content: |
      横看成岭侧成峰，
      远近高低各不同。
      不识庐山真面目，
      只缘身在此山中。
    location: 西林寺
    location_id: null
    background: |
      苏轼于元丰七年（1084 年）游庐山，在西林寺墙壁上题写此诗。
      诗人通过描写庐山变化多姿的面貌，
      表达了"当局者迷，旁观者清"的哲理。
    type: 哲理

  - id: 5
    title: 饮酒·其五
    author: 陶渊明
    author_id: 4
    dynasty: 东晋
    content: |
      结庐在人境，而无车马喧。
      问君何能尔？心远地自偏。
      采菊东篱下，悠然见南山。
      山气日夕佳，飞鸟相与还。
      此中有真意，欲辨已忘言。
    location: 庐山脚下
    location_id: null
    background: |
      陶渊明辞官归隐后，在庐山脚下过着田园生活。
      诗中"南山"即指庐山，表达了诗人悠闲自得的隐居生活。
    type: 抒情

  - id: 6
    title: 七律·登庐山
    author: 毛泽东
    author_id: 12
    dynasty: 现代
    content: |
      一山飞峙大江边，
      跃上葱茏四百旋。
      冷眼向洋看世界，
      热风吹雨洒江天。
      云横九派浮黄鹤，
      浪下三吴起白烟。
      陶令不知何处去，
      桃花源里可耕田？
    location: 庐山
    location_id: null
    background: |
      1959 年 7 月 1 日，毛泽东在庐山会议期间登山远眺，
      触景生情，写下此诗。
    type: 抒情

  - id: 7
    title: 归园田居·其一
    author: 陶渊明
    author_id: 4
    dynasty: 东晋
    content: |
      少无适俗韵，性本爱丘山。
      误落尘网中，一去三十年。
      羁鸟恋旧林，池鱼思故渊。
      开荒南野际，守拙归园田。
      方宅十余亩，草屋八九间。
      榆柳荫后檐，桃李罗堂前。
      暧暧远人村，依依墟里烟。
      狗吠深巷中，鸡鸣桑树颠。
      户庭无尘杂，虚室有余闲。
      久在樊笼里，复得返自然。
    location: 庐山脚下
    location_id: null
    background: |
      陶渊明辞去彭泽令后，归隐田园，作《归园田居》五首。
      描写了田园生活的宁静美好。
    type: 抒情

  - id: 8
    title: 庐山草堂记（节选）
    author: 白居易
    author_id: 6
    dynasty: 唐
    content: |
      匡庐奇秀，甲天下山。
      山北峰曰香炉峰，北寺曰遗爱寺。
      介峰寺间，其境胜绝，又甲庐山。
      元和十一年秋，太原人白乐天见而爱之，
      若远行客过故乡，恋恋不能去。
      因面峰腋寺，作为草堂。
    location: 庐山
    location_id: null
    background: |
      白居易在庐山建草堂隐居，作《庐山草堂记》记述其事。
      文章描写了庐山的秀丽景色和草堂周围的优美环境。
    type: 散文

  - id: 9
    title: 望庐山
    author: 欧阳修
    author_id: 10
    dynasty: 宋
    content: |
      南山高哉不可上，
      上有云气下苍莽。
      道人自言寿千岁，
      时来采药山中住。
      我昔少年喜远游，
      曾携短策登峰头。
      如今老矣归未得，
      空忆青山伴白鸥。
    location: 庐山
    location_id: null
    background: |
      欧阳修晚年回忆少年时游庐山的经历，感慨万千而作。
    type: 抒情

  - id: 10
    title: 登庐山五老峰
    author: 陆游
    author_id: 11
    dynasty: 南宋
    content: |
      五老峰前云作堆，
      五老峰后雪成堆。
      何当携取山中伴，
      共看青天挂玉杯。
    location: 五老峰
    location_id: 2
    background: |
      陆游游庐山五老峰时所作，描写了峰顶积雪的壮丽景色。
    type: 写景
